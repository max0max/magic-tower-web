<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Magic Tower Web</title>
    <meta
      name="description"
      content="A click-to-play browser Magic Tower game."
    >
    <link rel="stylesheet" href="./styles.css?v=2026052204">
  </head>
  <body>
    <main id="game" class="game-shell">
      <section class="hero" aria-labelledby="title">
        <p class="eyebrow">GitHub Pages Magic Tower</p>
        <h1 id="title">Magic Tower Web</h1>
        <p class="lead">
          Explore the tower, collect keys, open doors, fight sentries, and reach
          the exit. The whole game runs as a static web page.
        </p>
        <div class="actions">
          <button class="primary-button" type="button" data-action="start">
            Start game
          </button>
          <button class="secondary-button" type="button" data-action="restart">
            Restart
          </button>
        </div>
      </section>

      <section class="play-area" aria-label="Magic Tower game board">
        <aside class="status-panel" aria-label="Player status">
          <h2>Status</h2>
          <dl class="stats">
            <div><dt>HP</dt><dd data-stat="hp">100</dd></div>
            <div><dt>ATK</dt><dd data-stat="attack">10</dd></div>
            <div><dt>DEF</dt><dd data-stat="defense">5</dd></div>
            <div><dt>Gold</dt><dd data-stat="gold">0</dd></div>
            <div><dt>Keys</dt><dd data-stat="yellowKeys">0</dd></div>
            <div><dt>Floor</dt><dd data-stat="floor">1</dd></div>
          </dl>
          <p class="message" data-message>Press Start game to enter the tower.</p>
        </aside>

        <div
          id="tower-grid"
          class="tower-grid"
          aria-label="Tower map"
          role="grid"
        ></div>

        <div class="control-pad" aria-label="Movement controls">
          <button type="button" data-move="up" aria-label="Move up">Up</button>
          <button type="button" data-move="left" aria-label="Move left">Left</button>
          <button type="button" data-move="right" aria-label="Move right">Right</button>
          <button type="button" data-move="down" aria-label="Move down">Down</button>
        </div>
      </section>
    </main>
    <script type="module" src="./main.js?v=2026052204"></script>
  </body>
</html>
